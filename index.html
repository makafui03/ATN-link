<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Association des Togolais de Nancy — liens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F5F1;
    --ink:#1B1D1E;
    --ink-soft:#5C5B56;
    --line:#E3E1D9;
    --line-strong:#CFCCC0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:64px 20px 40px;
  }
  .card{
    width:100%;
    max-width:420px;
  }
  .avatar{
    width:76px;height:76px;border-radius:50%;
    background:var(--ink);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 20px;
    opacity:0;
    animation:rise .6s ease forwards;
  }
  .avatar span{
    font-family:'Instrument Serif',serif;
    font-style:italic;
    color:var(--paper);
    font-size:28px;
  }
  h1{
    font-family:'Instrument Serif',serif;
    font-style:italic;
    font-weight:400;
    font-size:38px;
    text-align:center;
    margin:0 0 6px;
    opacity:0;
    animation:rise .6s ease .08s forwards;
  }
  .handle{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    text-align:center;
    margin:0 0 14px;
    opacity:0;
    animation:rise .6s ease .14s forwards;
  }
  .bio{
    font-size:14.5px;
    line-height:1.6;
    color:var(--ink-soft);
    text-align:center;
    max-width:320px;
    margin:0 auto 34px;
    opacity:0;
    animation:rise .6s ease .2s forwards;
  }
  .links{
    display:flex;
    flex-direction:column;
    gap:10px;
    opacity:0;
    animation:rise .6s ease .28s forwards;
  }
  .link-row{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    padding:15px 18px;
    background:#fff;
    border:0.5px solid var(--line);
    border-left:2px solid var(--line);
    border-radius:0;
    text-decoration:none;
    color:var(--ink);
    transition:border-left-color .2s ease, transform .15s ease, border-color .2s ease;
  }
  .link-row:hover, .link-row:focus-visible{
    transform:translateX(3px);
    border-color:var(--line-strong);
  }
  .link-row .icon{
    flex:0 0 auto;
    width:20px;height:20px;
    display:flex;align-items:center;justify-content:center;
  }
  .link-row .icon svg{width:20px;height:20px;}
  .link-row .label{
    flex:1;
    font-size:14.5px;
    font-weight:500;
  }
  .link-row .arrow{
    flex:0 0 auto;
    font-size:15px;
    color:var(--ink-soft);
    transition:transform .15s ease;
  }
  .link-row:hover .arrow{transform:translateX(2px);}

  .link-row[data-brand="instagram"]:hover{border-left-color:#D6336C;}
  .link-row[data-brand="tiktok"]:hover{border-left-color:#1B1D1E;}
  .link-row[data-brand="youtube"]:hover{border-left-color:#D6362A;}
  .link-row[data-brand="x"]:hover{border-left-color:#1B1D1E;}
  .link-row[data-brand="bluesky"]:hover{border-left-color:#2B7FDE;}

  footer{
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:.03em;
    margin-top:36px;
    opacity:0;
    animation:rise .6s ease .34s forwards;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }
  @media (prefers-reduced-motion: reduce){
    .avatar,h1,.handle,.bio,.links,footer{animation:none; opacity:1;}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="avatar"><img src="LOGO.png" alt="Logo ATN"></div>
    <h1>Association des Togolais de Nancy</h1>
    <p class="handle">@Association des Togolais de Nancy</p>
    <p class="bio">Accueil, culture & solidarité à Nancy.<br>📍 Nancy | 💛 Rejoignez-nous.</p>

    <div class="links">
      <a class="link-row" data-brand="instagram" href="https://www.instagram.com/assodestogolaisdenancy/" target="_blank" rel="noopener">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="0.6" fill="currentColor" stroke="none"/></svg></span>
        <span class="label">Instagram</span>
        <span class="arrow">→</span>
      </a>
      <a class="link-row" data-brand="tiktok" href="https://www.tiktok.com/@asso.destogolaisde.nancy?lang=fr" target="_blank" rel="noopener">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 4v9.5a3.5 3.5 0 1 1-3.5-3.5"/><path d="M14 4c0 2.5 2 4.3 4.5 4.3"/></svg></span>
        <span class="label">TikTok</span>
        <span class="arrow">→</span>
      </a>
      <a class="link-row" data-brand="youtube" href="https://www.youtube.com/channel/UCJaZe-5fMeaaasOW2ExiCGQ" target="_blank" rel="noopener">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2.5" y="5.5" width="19" height="13" rx="4"/><path d="M10.5 9.5l5 2.5-5 2.5z" fill="currentColor" stroke="none"/></svg></span>
        <span class="label">YouTube</span>
        <span class="arrow">→</span>
      </a>
      <a class="link-row" data-brand="x" href="https://www.facebook.com/profile.php?id=61591908729911" target="_blank" rel="noopener">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4l16 16M20 4L4 20"/></svg></span>
        <span class="label">facebook</span>
        <span class="arrow">→</span>
      </a>
      <a class="link-row" data-brand="bluesky" href="https://www.linkedin.com/company/136154296/admin/dashboard/" target="_blank" rel="noopener">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 7c-1.5-3-5-4.5-7-3-.8 3.2.6 6 3 7.5C5.5 13 4 15.8 4.8 19c2 1.5 5.5 0 7-3 1.5 3 5 4.5 7 3 .8-3.2-.6-6-3-7.5 2.5-1.5 4-4.3 3.2-7.5-2-1.5-5.5 0-7 3z"/></svg></span>
        <span class="label">Linkedin</span>
        <span class="arrow">→</span>
      </a>
    </div>

    <footer>Suivez nous</footer>
  </div>
</body>
</html>
